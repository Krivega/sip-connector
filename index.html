<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/simple.min.css" />
    <link rel="stylesheet" href="/styles.css" />

    <title>Demo sip-connector call v%VITE_APP_VERSION%</title>
  </head>
  <body>
    <main>
      <section>
        <h3>Настройки звонка</h3>
        <form id="callForm">
          <label for="serverAddress">
            <span class="form-label-text">Адрес сервера</span>
            <input
              type="text"
              id="serverAddress"
              name="serverAddress"
              placeholder="sip.example.com"
              required
            />
          </label>

          <label for="displayName">
            <span class="form-label-text">Отображаемое имя</span>
            <input
              type="text"
              id="displayName"
              name="displayName"
              placeholder="Иван Иванов"
              required
            />
          </label>

          <label for="authEnabled">
            <span class="form-label-text">Авторизация</span>
            <input type="checkbox" id="authEnabled" name="authEnabled" />
          </label>

          <label for="userNumber">
            <span class="form-label-text">Номер пользователя</span>
            <input type="text" id="userNumber" name="userNumber" placeholder="1001" />
          </label>

          <label for="password">
            <span class="form-label-text">Пароль</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </label>

          <label for="conferenceNumber">
            <span class="form-label-text">Номер конференции</span>
            <input
              type="text"
              id="conferenceNumber"
              name="conferenceNumber"
              placeholder="2001"
              required
            />
          </label>
        </form>
      </section>

      <section id="presentationStressTestingSection" class="hidden">
        <details class="section-collapsible">
          <summary>Настройки стрессового тестирования презентации</summary>

          <label for="presentationStressMaxAttemptsCount">
            Количество попыток
            <input
              type="number"
              id="presentationStressMaxAttemptsCount"
              name="presentationStressMaxAttemptsCount"
              min="1"
              step="1"
              inputmode="numeric"
              value="50"
            />
          </label>

          <label for="presentationStressDelayBetweenAttempts">
            Задержка между попытками (мс)
            <input
              type="number"
              id="presentationStressDelayBetweenAttempts"
              name="presentationStressDelayBetweenAttempts"
              min="0"
              step="1"
              inputmode="numeric"
              value="300"
            />
          </label>

          <label for="presentationStressDelayBetweenStartAndStop">
            Задержка между стартом и стопом (мс)
            <input
              type="number"
              id="presentationStressDelayBetweenStartAndStop"
              name="presentationStressDelayBetweenStartAndStop"
              min="0"
              step="1"
              inputmode="numeric"
              value="500"
            />
          </label>

          <span id="stressTestingPresentationStatus"></span>

          <button id="startStressTestingPresentationButton" type="submit">
            Начать стрессовое тестирование презентации
          </button>
          <button id="stopStressTestingPresentationButton" type="submit">
            Остановить стрессовое тестирование презентации
          </button>
        </details>
      </section>

      <section id="mainStreamSettingsSection">
        <details class="section-collapsible">
          <summary>Настройки восстановления main stream</summary>
          <form id="mainStreamSettingsForm">
            <label for="minConsecutiveProblemSamplesCount">
              Сколько подряд «плохих» сэмплов нужно для детекта проблемы
              <input
                type="number"
                id="minConsecutiveProblemSamplesCount"
                name="minConsecutiveProblemSamplesCount"
                min="1"
                step="1"
                inputmode="numeric"
                value="3"
                required
              />
            </label>

            <label for="throttleRecoveryTimeout">
              Минимальный интервал между попытками восстановления (мс)
              <input
                type="number"
                id="throttleRecoveryTimeout"
                name="throttleRecoveryTimeout"
                min="100"
                step="100"
                inputmode="numeric"
                value="4000"
                required
              />
            </label>

            <button id="applyMainStreamSettingsButton" type="submit">Применить настройки</button>
          </form>
        </details>
      </section>

      <section id="localVideoSection" class="hidden">
        <details class="section-collapsible" open>
          <summary>Локальное видео</summary>
          <video class="local-video" id="localVideo" autoplay playsinline muted></video>
          <video
            class="local-video hidden"
            id="presentationVideo"
            autoplay
            playsinline
            muted
          ></video>
        </details>
      </section>

      <section>
        <details class="section-collapsible">
          <summary>Статусы</summary>
          <div id="sessionStatusesDiagrams" class="session-statuses"></div>
          <div class="hidden">
            <span id="connectionStatus"></span>
            <span id="autoConnectorManagerStatus"></span>
            <span id="callStatus"></span>
            <span id="incomingStatus"></span>
            <span id="presentationStatus"></span>
            <span id="systemStatus"></span>
          </div>

          <div id="statusesNodeValues" class="conference-state"></div>
        </details>
      </section>

      <section id="activeCallSection" class="hidden">
        <details class="section-collapsible" open>
          <summary>Активный звонок</summary>

          <section>
            <details class="section-collapsible" open>
              <summary>Удаленные потоки</summary>
              <div id="remoteStreamsContainer"></div>
            </details>
          </section>

          <section>
            <details class="section-collapsible" open>
              <summary>Качество приема (зритель)</summary>
              <fieldset id="recvQualityRadios" class="recv-quality-radios">
                <legend>Качество</legend>
                <label><input type="radio" name="recvQuality" value="auto" checked /> auto</label>
                <label><input type="radio" name="recvQuality" value="high" /> high</label>
                <label><input type="radio" name="recvQuality" value="medium" /> medium</label>
                <label><input type="radio" name="recvQuality" value="low" /> low</label>
              </fieldset>
              <div id="recvQualityStatus" class="status-box"></div>
            </details>
          </section>

          <section id="callStatsSection">
            <details class="section-collapsible" open>
              <summary>Статистика звонка</summary>
              <div class="call-stats-tabs">
                <button id="callStatsTabAudio" type="button" class="call-stats-tab">Audio</button>
                <button id="callStatsTabMainStream" type="button" class="call-stats-tab is-active">
                  Main stream
                </button>
                <button id="callStatsTabContentedStream" type="button" class="call-stats-tab">
                  Contented stream
                </button>
              </div>
              <div class="call-stats-panels">
                <div id="callStatsAudioPanel" class="call-stats-panel">
                  <div id="callStatsAudio"></div>
                </div>
                <div id="callStatsMainStreamPanel" class="call-stats-panel is-active">
                  <div id="callStatsMainStream"></div>
                </div>
                <div id="callStatsContentedStreamPanel" class="call-stats-panel">
                  <div id="callStatsContentedStream"></div>
                </div>
              </div>
            </details>
          </section>
        </details>
      </section>

      <section id="logsContainer">
        <details class="section-collapsible">
          <summary>Логи событий</summary>
          <div class="logs-controls">
            <button id="clearLogsButton" type="button">clear logs</button>
            <input
              id="filterLogsInput"
              type="text"
              placeholder="Имя события..."
              class="filter-logs-input"
            />
          </div>
          <div id="logsList"></div>
        </details>
      </section>
    </main>

    <div id="loaderOverlay" class="loader-overlay hidden"></div>
    <div id="notificationsContainer" class="notifications-container" aria-live="polite"></div>

    <div class="floating-action-panel">
      <button
        id="connectButton"
        type="button"
        title="Подключиться к серверу"
        aria-label="Подключиться к серверу"
      >
        <span class="icon icon--size-regular" aria-hidden="true">cloud_upload</span>
      </button>
      <button
        id="disconnectButton"
        type="button"
        class="hidden"
        title="Отключиться от сервера"
        aria-label="Отключиться от сервера"
      >
        <span class="icon icon--size-regular" aria-hidden="true">cloud_off</span>
      </button>
      <button id="callButton" type="button" title="Позвонить" aria-label="Позвонить">
        <span class="icon icon--size-regular" aria-hidden="true">call</span>
      </button>
      <button
        id="endCallButton"
        type="button"
        class="hidden"
        title="Завершить звонок"
        aria-label="Завершить звонок"
      >
        <span class="icon icon--size-regular" aria-hidden="true">call_end</span>
      </button>
      <button
        id="muteCameraButton"
        type="button"
        class="hidden"
        title="Выключить камеру"
        aria-label="Выключить камеру"
      >
        <span class="icon icon--size-regular" aria-hidden="true">videocam</span>
      </button>
      <button
        id="unmuteCameraButton"
        type="button"
        class="hidden"
        title="Включить камеру"
        aria-label="Включить камеру"
      >
        <span class="icon icon--size-regular" aria-hidden="true">videocam_off</span>
      </button>
      <button
        id="muteMicButton"
        type="button"
        class="hidden"
        title="Выключить микрофон"
        aria-label="Выключить микрофон"
      >
        <span class="icon icon--size-regular" aria-hidden="true">mic</span>
      </button>
      <button
        id="unmuteMicButton"
        type="button"
        class="hidden"
        title="Включить микрофон"
        aria-label="Включить микрофон"
      >
        <span class="icon icon--size-regular" aria-hidden="true">mic_off</span>
      </button>
      <button
        id="startPresentationButton"
        type="button"
        class="hidden"
        title="Начать презентацию"
        aria-label="Начать презентацию"
      >
        <span class="icon icon--size-regular" aria-hidden="true">screen_share</span>
      </button>
      <button
        id="stopPresentationButton"
        type="button"
        class="hidden"
        title="Завершить презентацию"
        aria-label="Завершить презентацию"
      >
        <span class="icon icon--size-regular" aria-hidden="true">stop_screen_share</span>
      </button>
    </div>

    <script type="module" src="demo/index.ts"></script>
  </body>
</html>
